name: Secrets Check

on: [push, pull_request]

permissions:
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for secrets
        run: |
          if find . -name ".*env*" -not -path "./.git/*" -not -name ".gitignore" | grep -q .; then
            echo "ERROR: .env file found in repo"
            exit 1
          fi
          if find . -name "*.key" -not -path "./.git/*" | grep -q .; then
            echo "ERROR: .key file found in repo"
            exit 1
          fi
          echo "No secrets found ✅"
