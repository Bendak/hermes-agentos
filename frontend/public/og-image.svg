<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <!-- Radial glow behind glyph -->
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#00E5B9" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#0B1120" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle dot grid -->
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#00E5B9" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="#0B1120"/>

  <!-- Dot-grid texture -->
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Radial glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Winged Glyph centered, scaled -->
  <g transform="translate(540, 185) scale(2.6)">
    <path d="M2 32 C8 28, 14 18, 20 8 C16 14, 10 22, 6 28 Z" fill="#00E5B9"/>
    <path d="M8 32 C14 26, 20 16, 28 4 C22 12, 16 22, 12 28 Z" fill="#38BDF8" opacity="0.75"/>
    <path d="M16 6 L22 34" stroke="#00E5B9" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="380" text-anchor="middle"
        font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="64" font-weight="700" fill="#F0F4FA" letter-spacing="-1.5">Agent<tspan font-weight="400" fill="#94A3B8">OS</tspan></text>

  <!-- Tagline -->
  <text x="600" y="430" text-anchor="middle"
        font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
        font-size="20" font-weight="400" fill="#94A3B8" opacity="0.65">Control plane for Hermes Agent</text>

  <!-- Bottom accent line -->
  <line x1="500" y1="470" x2="700" y2="470" stroke="#00E5B9" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
</svg>
